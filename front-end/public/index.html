<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="../public/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Global Cheque Processor - Upload and cash cheques from anywhere in the world"
    />
    <meta name="keywords" content="cheque, cash, mobile deposit, banking, finance" />
    <meta name="author" content="Cheque Processor App" />
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Global Cheque Processor" />
    <meta property="og:description" content="Upload and cash cheques from anywhere in the world" />
    <meta property="og:type" content="website" />
    
    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Global Cheque Processor" />
    <meta name="twitter:description" content="Upload and cash cheques from anywhere in the world" />
    
    <link rel="apple-touch-icon" href="../public/logo.png" />
    <link rel="manifest" href="../public/manifest.json" />
    
    <!-- Preconnect to external domains for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    

    
    
    <style>
      /* Custom CSS for additional styles */
      body {
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      /* Loading spinner */
      .loading-spinner {
        border: 3px solid #f3f4f6;
        border-top: 3px solid #3b82f6;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      
      ::-webkit-scrollbar-track {
        background: #f1f5f9;
      }
      
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 3px;
      }
      
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      
      /* Print styles */
      @media print {
        .no-print {
          display: none !important;
        }
      }
    </style>
    
    <title>Global Cheque Processor - Cash Cheques Worldwide</title>
  </head>
  <body class="bg-gray-50">
    <noscript>
      <div style="padding: 2rem; text-align: center; background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; margin: 2rem; border-radius: 0.5rem;">
        <h2 style="font-size: 1.5rem; font-weight: bold; margin-bottom: 1rem;">JavaScript Required</h2>
        <p>You need to enable JavaScript to run this application. Please enable JavaScript in your browser settings and refresh the page.</p>
        <p style="margin-top: 1rem; font-size: 0.875rem;">
          This is a modern web application that requires JavaScript for all functionality including cheque upload, processing, and account management.
        </p>
      </div>
    </noscript>
    
    <!-- Loading screen -->
    <div id="initial-loading" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;">
      <div class="loading-spinner" style="width: 40px; height: 40px; border-width: 4px;"></div>
      <p style="margin-top: 1rem; color: #6b7280; font-size: 1rem;">Loading Cheque Processor...</p>
    </div>
    
    <!-- Main React App Container -->
    <div id="root"></div>
    
    <!-- Script to hide loading screen once React loads -->
    <script>
      // Hide the initial loading screen when React app mounts
      window.addEventListener('load', function() {
        setTimeout(function() {
          const loadingElement = document.getElementById('initial-loading');
          if (loadingElement) {
            loadingElement.style.display = 'none';
          }
        }, 500);
      });
      
      // Error handling for failed loading
      window.addEventListener('error', function() {
        const loadingElement = document.getElementById('initial-loading');
        if (loadingElement) {
          loadingElement.innerHTML = `
            <div style="text-align: center; color: #dc2626;">
              <svg style="width: 48px; height: 48px; margin-bottom: 1rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z" />
              </svg>
              <h2 style="font-size: 1.25rem; font-weight: bold; margin-bottom: 0.5rem;">Failed to Load Application</h2>
              <p>Please check your internet connection and refresh the page.</p>
              <button onclick="window.location.reload()" style="margin-top: 1rem; padding: 0.5rem 1rem; background: #dc2626; color: white; border: none; border-radius: 0.375rem; cursor: pointer;">
                Refresh Page
              </button>
            </div>
          `;
        }
      });
    </script>
  </body>
</html>
